<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Globe circle -->
  <circle cx="256" cy="280" r="200" fill="none" stroke="#6366f1" stroke-width="16" opacity="0.25"/>
  <!-- Globe latitude lines -->
  <ellipse cx="256" cy="280" rx="200" ry="70" fill="none" stroke="#6366f1" stroke-width="10" opacity="0.15"/>
  <ellipse cx="256" cy="280" rx="130" ry="200" fill="none" stroke="#6366f1" stroke-width="10" opacity="0.15"/>
  <!-- Pin -->
  <g transform="translate(256, 200)">
    <!-- Pin shadow -->
    <ellipse cx="0" cy="140" rx="40" ry="10" fill="#000" opacity="0.15"/>
    <!-- Pin body -->
    <path d="M0-120 C-50-120 -80-85 -80-50 C-80 0 0 120 0 120 C0 120 80 0 80-50 C80-85 50-120 0-120Z" fill="#f59e0b"/>
    <!-- Pin inner circle -->
    <circle cx="0" cy="-50" r="30" fill="#0f0f14"/>
    <!-- Pin dot -->
    <circle cx="0" cy="-50" r="12" fill="#f59e0b" opacity="0.6"/>
  </g>
</svg>
